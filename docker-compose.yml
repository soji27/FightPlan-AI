services:
  ollama:
    image: ollama/ollama:latest
    container_name: fightplan-ollama
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  chromadb:
    image: chromadb/chroma:latest
    container_name: fightplan-chromadb
    ports: ["8000:8000"]
    volumes:
      - ./vectordb:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - ANONYMIZED_TELEMETRY=False
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fightplan-app
    ports: ["8501:8501"]
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      - CHROMA_HOST=${CHROMA_HOST:-http://chromadb:8000}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - CSV_PATH=${CSV_PATH:-/app/data/fighters/ufc_data.csv}
      - MAX_INPUT_LENGTH=${MAX_INPUT_LENGTH:-2000}
    depends_on:
      ollama:
        condition: service_started
      chromadb:
        condition: service_started
    restart: unless-stopped
    command: streamlit run app/ui/streamlit_app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  ollama_data:
